name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"] # mainまたはmasterブランチにpushされた時に実行

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # 依存パッケージのインストール
      - name: Install dependencies
        run: npm install

      # 環境変数（GASのAPI URL）をビルド時に埋め込む
      - name: Build
        env:
          VITE_GAS_API_URL: ${{ secrets.VITE_GAS_API_URL }}
        run: npm run build

      - name: Check env exists
        env:
          VITE_GAS_API_URL: ${{ secrets.VITE_GAS_API_URL }}
        run: |
          if [ -z "$VITE_GAS_API_URL" ]; then
            echo "EMPTY"
          else
            echo "SET"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
